<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Valentine Aesthetic ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Dancing+Script:wght@400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Cormorant Garamond', serif;

    background:
        radial-gradient(circle at 20% 20%, #ffd6e5 0%, transparent 40%),
        radial-gradient(circle at 80% 30%, #ffe4ec 0%, transparent 45%),
        radial-gradient(circle at 50% 80%, #fff0f5 0%, transparent 50%),
        linear-gradient(135deg, #fbe9f0, #f5dfe6);
}

/* Floating canvas */
canvas {
    position: fixed;
    inset: 0;
    z-index: 1;
}

/* Main Card */
.card {
    width: min(420px, 90%);
    background: rgba(255,255,255,0.25);
    backdrop-filter: blur(12px);
    border-radius: 40px;
    padding: 20px;
    z-index: 2;
    box-shadow: 0 20px 50px rgba(0,0,0,0.1);
    animation: fadeIn 1.5s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: scale(1.05); }
    to { opacity: 1; transform: scale(1); }
}

/* Camera */
.frame {
    width: 100%;
    aspect-ratio: 4/3;
    border-radius: 30px;
    overflow: hidden;
    position: relative;

    background: rgba(255, 220, 235, 0.3);
    box-shadow: 0 0 40px rgba(255, 105, 135, 0.25);
    animation: glow 4s ease-in-out infinite;
}

@keyframes glow {
    0%,100% { box-shadow: 0 0 30px rgba(255,105,135,0.2); }
    50% { box-shadow: 0 0 60px rgba(255,105,135,0.35); }
}

video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
}

/* Text */
.text {
    text-align: center;
    margin-top: 18px;
    color: #4a2c2f;
}

.big {
    font-size: 1.1rem;
    margin-bottom: 8px;
}

.love {
    font-family: 'Dancing Script', cursive;
    font-size: 1.6rem;
    color: #d14b6a;
    margin: 8px 0;
}

.ask {
    font-size: 1rem;
    color: #b45a6a;
    animation: pulse 2.5s infinite;
}

@keyframes pulse {
    0%,100% { opacity: 0.7; }
    50% { opacity: 1; }
}

.sign {
    margin-top: 10px;
    font-family: 'Dancing Script', cursive;
    text-align: right;
    font-size: 0.9rem;
    color: #8b5a62;
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<div class="card">
    <div class="frame">
        <video id="video" autoplay playsinline muted></video>
    </div>

    <div class="text">
        <div class="big">✨ you are the most beautiful view ✨</div>
        <div class="love">Happy Valentine's Day 💖</div>
        <div class="ask">Will you be my Valentine? 🌸</div>
        <div class="sign">— made with love</div>
    </div>
</div>

<script>
/* CAMERA */
const video = document.getElementById("video");

async function startCam() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "user" }
        });
        video.srcObject = stream;
        await video.play();
    } catch (e) {
        console.log("camera blocked");
    }
}
startCam();

/* HEART PARTICLES */
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let w, h;
function resize(){
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

class Heart {
    constructor(){
        this.reset();
    }

    reset(){
        this.x = Math.random() * w;
        this.y = Math.random() * h;
        this.size = Math.random() * 10 + 6;
        this.speed = Math.random() * 0.6 + 0.2;
        this.alpha = Math.random() * 0.5 + 0.2;
        this.wave = Math.random() * 10;
    }

    update(t){
        this.y -= this.speed;
        this.x += Math.sin(t*0.001 + this.wave) * 0.5;

        if(this.y < -20){
            this.y = h + 20;
            this.x = Math.random() * w;
        }
    }

    draw(){
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.globalAlpha = this.alpha;
        ctx.fillStyle = "#ff5c8a";

        const s = this.size;

        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.bezierCurveTo(-s, -s, -s, s, 0, s);
        ctx.bezierCurveTo(s, s, s, -s, 0, 0);
        ctx.fill();

        ctx.restore();
    }
}

let hearts = [];
for(let i=0;i<60;i++){
    hearts.push(new Heart());
}

function animate(t){
    ctx.clearRect(0,0,w,h);

    for(let hrt of hearts){
        hrt.update(t);
        hrt.draw();
    }

    requestAnimationFrame(animate);
}
animate(0);
</script>

</body>
</html>
