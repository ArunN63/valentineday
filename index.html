<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <title>Happy Valentine's Day ❤️</title>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Dancing+Script:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(125deg, #fbe9f0 0%, #f5dfe6 50%, #f3d8e2 100%);
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Cormorant Garamond', serif;
            padding: 20px;
            position: relative;
            overflow-x: hidden;

            animation: fadeDream 1.8s ease;
        }

        @keyframes fadeDream {
            from {
                opacity: 0;
                transform: scale(1.02);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .dream-card {
            max-width: 500px;
            width: 100%;
            background: rgba(255, 248, 245, 0.3);
            backdrop-filter: blur(10px);
            border-radius: 72px;
            box-shadow:
                0 20px 35px rgba(0, 0, 0, 0.05),
                0 0 0 1px rgba(255, 245, 235, 0.6);

            padding: 24px 24px 36px;
            z-index: 10;
            transition: all 0.3s ease;
        }

        .camera-frame {
            position: relative;
            width: 100%;
            aspect-ratio: 4 / 3;
            background: #f5e6e6;
            border-radius: 52px;
            overflow: hidden;

            box-shadow:
                0 18px 32px rgba(0, 0, 0, 0.06),
                inset 0 0 0 2px rgba(255, 245, 235, 0.8);
        }

        .camera-frame.active {
            box-shadow:
                0 0 0 2px #ffe2d4,
                0 18px 32px rgba(0, 0, 0, 0.06);
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        .camera-message {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;

            color: #8d5f67;
            font-size: 1rem;
            padding: 20px;
            line-height: 1.5;
        }

        .poem {
            margin-top: 30px;
            text-align: center;
            color: #4a2c2f;
            line-height: 1.45;
        }

        .line-beautiful {
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 0.3px;
            color: #5e3a42;
            margin-bottom: 10px;
        }

        .line-valentine {
            font-size: 1.3rem;
            font-weight: 500;
            margin: 8px 0 10px;
            color: #b14b5e;
            letter-spacing: 0.2px;
            font-family: 'Dancing Script', cursive;
        }

        .question-pulse {
            font-size: 1rem;
            display: inline-block;
            animation: gentlePulse 2.6s ease-in-out infinite;
            margin: 6px 0 10px;
            color: #c2777a;
        }

        @keyframes gentlePulse {
            0% {
                opacity: 0.75;
                transform: scale(1);
            }

            50% {
                opacity: 1;
                transform: scale(1.01);
            }

            100% {
                opacity: 0.75;
                transform: scale(1);
            }
        }

        .signature-wrap {
            text-align: right;
            margin-top: 18px;
            padding-right: 8px;
        }

        .signature {
            font-size: 0.9rem;
            letter-spacing: 1px;
            color: #9b6b72;
            font-style: italic;
            font-family: 'Dancing Script', cursive;
        }

        .aesthetic-canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 25;
        }

        @media (max-width: 480px) {
            .line-beautiful {
                font-size: 0.85rem;
            }

            .line-valentine {
                font-size: 1.1rem;
            }

            .question-pulse {
                font-size: 0.85rem;
            }

            .signature {
                font-size: 0.75rem;
            }

            .dream-card {
                padding: 18px 18px 28px;
                border-radius: 48px;
            }

            .camera-frame {
                border-radius: 36px;
            }
        }
    </style>
</head>

<body>

<div class="dream-card">

    <div class="camera-frame" id="cameraBox">
        <video id="frontVideo" autoplay playsinline muted></video>
    </div>

    <div class="poem">
        <div class="line-beautiful">
            ✨ you are looking at the most beautiful person in the world ✨
        </div>

        <div class="line-valentine">
            💖 happy valentine's day 💖
        </div>

        <div class="question-pulse">
            🌸 will you be my valentine? 🌸
        </div>

        <div class="signature-wrap">
            <span class="signature">— mohan arun</span>
        </div>
    </div>
</div>

<canvas id="particleCanvas" class="aesthetic-canvas"></canvas>

<script>
(() => {

    const video = document.getElementById("frontVideo");
    const camDiv = document.getElementById("cameraBox");

    async function startCamera() {

        try {

            const stream = await navigator.mediaDevices.getUserMedia({
                video: {
                    facingMode: "user",
                    width: { ideal: 1280 },
                    height: { ideal: 720 }
                }
            });

            video.srcObject = stream;

            await video.play();

            camDiv.classList.add("active");

            return true;

        } catch (err) {

            console.warn("camera permission denied");

            camDiv.innerHTML = `
                <div class="camera-message">
                    🌸 camera access denied <br>
                    but the dream still blooms ✨
                </div>
            `;

            return false;
        }
    }

    const canvas = document.getElementById("particleCanvas");
    const ctx = canvas.getContext("2d");

    let w = window.innerWidth;
    let h = window.innerHeight;

    const isMobile = window.innerWidth < 768;

    const PETAL_COUNT = isMobile ? 28 : 48;
    const BUBBLE_COUNT = isMobile ? 30 : 55;
    const LEAF_COUNT = isMobile ? 25 : 45;
    const DUST_COUNT = isMobile ? 40 : 70;

    let petals = [];
    let bubbles = [];
    let leaves = [];
    let dust = [];

    class DreamPetal {

        constructor() {
            this.reset();
        }

        reset() {
            this.x = Math.random() * w;
            this.y = Math.random() * h;

            this.size = Math.random() * 9 + 3;

            this.speedX = (Math.random() - 0.5) * 0.25;
            this.speedY = Math.random() * 0.35 + 0.08;

            this.rot = Math.random() * Math.PI * 2;
            this.rotSpeed = (Math.random() - 0.5) * 0.015;

            this.wave = Math.random() * Math.PI * 2;

            this.opacity = Math.random() * 0.6 + 0.25;

            const colors = [
                '#FBC4D0',
                '#F9B7C5',
                '#FEC5D1',
                '#FFD1DC'
            ];

            this.color = colors[Math.floor(Math.random() * colors.length)];
        }

        update(time) {

            this.x += this.speedX + Math.sin(time * 0.0015 + this.wave) * 0.07;
            this.y += this.speedY + Math.cos(time * 0.0012 + this.wave) * 0.05;

            this.rot += this.rotSpeed;

            if (this.y > h + 60) {
                this.y = -40;
                this.x = Math.random() * w;
            }
        }

        draw(time) {

            ctx.save();

            ctx.translate(this.x, this.y);

            ctx.rotate(this.rot);

            ctx.globalAlpha =
                this.opacity *
                (0.8 + 0.2 * Math.sin(time * 0.003));

            const petalCount = 5;
            const angleStep = (Math.PI * 2) / petalCount;

            for (let i = 0; i < petalCount; i++) {

                const angle = i * angleStep;

                const xOff = Math.cos(angle) * this.size * 0.9;
                const yOff = Math.sin(angle) * this.size * 0.9;

                ctx.save();

                ctx.translate(xOff, yOff);

                ctx.rotate(angle);

                ctx.beginPath();

                ctx.ellipse(
                    0,
                    0,
                    this.size * 0.5,
                    this.size,
                    0,
                    0,
                    Math.PI * 2
                );

                ctx.fillStyle = this.color;

                ctx.fill();

                ctx.restore();
            }

            ctx.beginPath();

            ctx.arc(0, 0, this.size * 0.3, 0, Math.PI * 2);

            ctx.fillStyle = "#fff2dd";

            ctx.fill();

            ctx.restore();
        }
    }

    class WaterBubble {

        constructor() {

            this.x = Math.random() * w;
            this.y = Math.random() * h;

            this.r = Math.random() * 15 + 4;

            this.speedX = (Math.random() - 0.5) * 0.2;
            this.speedY = Math.random() * 0.35 + 0.1;

            this.opacity = Math.random() * 0.5 + 0.15;

            this.wave = Math.random() * Math.PI * 2;
        }

        update(time) {

            this.x += this.speedX +
                Math.sin(time * 0.0017 + this.wave) * 0.07;

            this.y += this.speedY;

            if (this.y > h + 70) {
                this.y = -50;
                this.x = Math.random() * w;
            }
        }

        draw(time) {

            ctx.save();

            ctx.translate(this.x, this.y);

            ctx.globalAlpha =
                this.opacity *
                (0.7 + 0.3 * Math.sin(time * 0.0025));

            const grad = ctx.createRadialGradient(
                -this.r * 0.3,
                -this.r * 0.3,
                2,
                0,
                0,
                this.r
            );

            grad.addColorStop(0, 'rgba(240,250,255,0.9)');
            grad.addColorStop(1, 'rgba(170,200,230,0.2)');

            ctx.beginPath();

            ctx.arc(0, 0, this.r, 0, Math.PI * 2);

            ctx.fillStyle = grad;

            ctx.fill();

            ctx.restore();
        }
    }

    class SoftLeaf {

        constructor() {

            this.x = Math.random() * w;
            this.y = Math.random() * h;

            this.wid = Math.random() * 7 + 2.5;
            this.hei = Math.random() * 4 + 1.5;

            this.rot = Math.random() * Math.PI * 2;

            this.speedX = (Math.random() - 0.5) * 0.15;
            this.speedY = Math.random() * 0.25 + 0.08;

            this.opacity = Math.random() * 0.6 + 0.2;
        }

        update() {

            this.x += this.speedX;
            this.y += this.speedY;

            this.rot += 0.008;

            if (this.y > h + 45) {
                this.y = -30;
                this.x = Math.random() * w;
            }
        }

        draw() {

            ctx.save();

            ctx.translate(this.x, this.y);

            ctx.rotate(this.rot);

            ctx.globalAlpha = this.opacity;

            ctx.fillStyle = 'rgba(180,210,140,0.6)';

            ctx.beginPath();

            ctx.ellipse(
                0,
                0,
                this.wid,
                this.hei,
                0,
                0,
                Math.PI * 2
            );

            ctx.fill();

            ctx.restore();
        }
    }

    class FairyDust {

        constructor() {

            this.x = Math.random() * w;
            this.y = Math.random() * h;

            this.size = Math.random() * 2.5 + 1;

            this.speedY = Math.random() * 0.15 + 0.03;

            this.opacity = Math.random() * 0.5 + 0.2;
        }

        update() {

            this.y += this.speedY;

            if (this.y > h + 25) {
                this.y = -15;
                this.x = Math.random() * w;
            }
        }

        draw(time) {

            ctx.save();

            ctx.globalAlpha =
                this.opacity *
                (0.6 + 0.4 * Math.sin(time * 0.006 + this.x));

            ctx.fillStyle = '#fff5f0';

            ctx.beginPath();

            ctx.arc(
                this.x,
                this.y,
                this.size,
                0,
                Math.PI * 2
            );

            ctx.fill();

            ctx.restore();
        }
    }

    function resizeCanvas() {

        w = window.innerWidth;
        h = window.innerHeight;

        canvas.width = w;
        canvas.height = h;
    }

    function initParticles() {

        petals = [];
        bubbles = [];
        leaves = [];
        dust = [];

        for (let i = 0; i < PETAL_COUNT; i++) {
            petals.push(new DreamPetal());
        }

        for (let i = 0; i < BUBBLE_COUNT; i++) {
            bubbles.push(new WaterBubble());
        }

        for (let i = 0; i < LEAF_COUNT; i++) {
            leaves.push(new SoftLeaf());
        }

        for (let i = 0; i < DUST_COUNT; i++) {
            dust.push(new FairyDust());
        }
    }

    function animateWorld() {

        const time = Date.now();

        ctx.clearRect(0, 0, w, h);

        for (const leaf of leaves) {
            leaf.update();
            leaf.draw();
        }

        for (const petal of petals) {
            petal.update(time);
            petal.draw(time);
        }

        for (const bubble of bubbles) {
            bubble.update(time);
            bubble.draw(time);
        }

        for (const d of dust) {
            d.update();
            d.draw(time);
        }

        requestAnimationFrame(animateWorld);
    }

    window.addEventListener("resize", resizeCanvas);

    async function startDream() {

        resizeCanvas();

        initParticles();

        animateWorld();

        await startCamera();
    }

    startDream();

})();
</script>

</body>
</html>
